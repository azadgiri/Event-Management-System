{% extends 'events/base.html' %}

{% block content %}
    <div class="card" style="text-align: center; padding: 4rem 2rem;">
        <h2 style="color: var(--primary); margin-bottom: 1rem;">🎉 Registration Successful!</h2>
        <p style="margin-bottom: 2rem;">You have successfully registered for <strong>{{ event.title }}</strong>.</p>
        <p class="meta" style="margin-bottom: 2rem;">We have recorded your details and look forward to seeing you on {{ event.date }}!</p>
        <a href="{% url 'event_list' %}" class="btn">View More Events</a>
    </div>
{% endblock %}
